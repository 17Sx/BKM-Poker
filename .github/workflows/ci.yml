name: CI

on:
  push:
    branches:
      - main
      - refactor/drizzle-neon-backend
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          BETTER_AUTH_SECRET: ci-build-secret-minimum-32-characters-long
          BETTER_AUTH_URL: https://example.vercel.app
          NEXT_PUBLIC_APP_URL: https://example.vercel.app
